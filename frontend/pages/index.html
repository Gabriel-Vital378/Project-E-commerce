<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Produtos — Periféricos.shop</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="../css/estilo.css">
</head>
<body>

<div class="container py-4">
  <div class="cabecalho-pagina">
    <h1>Nossos <span>Periféricos</span></h1>
    <p style="color:var(--cor-texto-secundario);font-size:0.9rem;margin-top:4px">
      Os melhores mouses, teclados e headsets para o seu setup
    </p>
  </div>

  <!-- Filtros de categoria -->
  <div class="abas-filtro" id="abas-filtro">
    <button class="aba-filtro ativa" data-categoria="all">Todos</button>
    <button class="aba-filtro" data-categoria="mouse">🖱 Mouse</button>
    <button class="aba-filtro" data-categoria="teclado">⌨ Teclado</button>
    <button class="aba-filtro" data-categoria="headset">🎧 Headset</button>
  </div>

  <div class="d-flex justify-content-between align-items-center mb-3">
    <span id="info-resultados" style="color:var(--cor-texto-suave);font-size:0.85rem"></span>
    <select id="selecionar-ordenacao" class="form-select" style="width:auto;font-size:0.85rem">
      <option value="">Ordenar por</option>
      <option value="preco-asc">Menor preço</option>
      <option value="preco-desc">Maior preço</option>
    </select>
  </div>

  <!-- Grade de produtos -->
  <div id="grade-produtos" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-3"></div>

  <!-- Paginação -->
  <div id="paginacao" class="d-flex justify-content-center gap-2 mt-4"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/utilitarios.js"></script>
<script>
  construirNavbar();

  // Estado da página
  var estado = {
    categoria: "all",
    busca: "",
    pagina: 1,
    limite: 12,
    total: 0,
    todosProdutos: [],
  };

  // Pega parâmetro de busca da URL (vindo da navbar)
  var parametros = new URLSearchParams(window.location.search);
  if (parametros.get("busca")) {
    estado.busca = parametros.get("busca");
    setTimeout(function() {
      var campo = document.getElementById("campo-busca");
      if (campo) campo.value = estado.busca;
    }, 50);
  }

  // ── Carrega produtos do backend ──
  async function carregarProdutos() {
    dom.mostrarCarregando("grade-produtos", "Carregando produtos...");
    document.getElementById("paginacao").innerHTML = "";
    document.getElementById("info-resultados").textContent = "";

    var qs = "?pagina=" + estado.pagina + "&limite=" + estado.limite;
    if (estado.categoria !== "all") qs += "&category=" + estado.categoria;
    if (estado.busca) qs += "&search=" + encodeURIComponent(estado.busca);

    // Nota: o backend usa page/limit (em inglês) pois é a API REST
    var url = "/products?page=" + estado.pagina + "&limit=" + estado.limite;
    if (estado.categoria !== "all") url += "&category=" + estado.categoria;
    if (estado.busca) url += "&search=" + encodeURIComponent(estado.busca);

    var resultado = await cliente.buscar(url);

    if (!resultado.success) {
      dom.mostrarVazio("grade-produtos", "⚠", "Erro ao carregar produtos", resultado.message || "Verifique se o backend está rodando.");
      return;
    }

    estado.todosProdutos = resultado.data;
    estado.total = resultado.pagination.total;

    renderizarProdutos(resultado.data);
    renderizarPaginacao(resultado.pagination);

    document.getElementById("info-resultados").textContent =
      estado.total + " produto" + (estado.total !== 1 ? "s" : "") + " encontrado" + (estado.total !== 1 ? "s" : "");
  }

  // ── Renderiza os cards de produto ──
  function renderizarProdutos(produtos) {
    var grade = document.getElementById("grade-produtos");

    if (!produtos || produtos.length === 0) {
      dom.mostrarVazio("grade-produtos", "🔍", "Nenhum produto encontrado", "Tente outra categoria ou termo de busca.");
      return;
    }

    var html = "";
    for (var i = 0; i < produtos.length; i++) {
      var p = produtos[i];
      var dadosProduto = JSON.stringify(p).replace(/"/g, "&quot;");

      html +=
        '<div class="col">' +
          '<div class="cartao-produto" onclick="window.location.href=\'produto.html?id=' + p.id + '\'">' +
            '<img src="' + p.image + '" alt="' + p.name + '" class="cartao-produto-imagem" ' +
              'onerror="this.src=\'https://placehold.co/400x200/111827/00d4ff?text=Produto\'">' +
            '<div class="cartao-produto-corpo">' +
              '<span class="cartao-produto-categoria">' + formatar.categoria(p.category) + '</span>' +
              '<h3 class="cartao-produto-nome">' + p.name + '</h3>' +
              '<p class="cartao-produto-descricao">' + p.description + '</p>' +
            '</div>' +
            '<div class="cartao-produto-rodape">' +
              '<span class="preco-produto">' + formatar.moeda(p.price) + '</span>' +
              (p.stock > 0
                ? '<button class="btn-destaque" style="font-size:0.8rem;padding:0.3rem 0.75rem" ' +
                    'onclick="event.stopPropagation();adicionarAoCarrinho(' + dadosProduto + ')">+ Carrinho</button>'
                : '<span class="estoque-produto esgotado">Esgotado</span>'
              ) +
            '</div>' +
          '</div>' +
        '</div>';
    }
    grade.innerHTML = html;
  }

  // ── Ordenação local ──
  function ordenarERenderizar(criterio) {
    var lista = estado.todosProdutos.slice();
    if (criterio === "preco-asc")  lista.sort(function(a,b){ return a.price - b.price; });
    if (criterio === "preco-desc") lista.sort(function(a,b){ return b.price - a.price; });
    renderizarProdutos(lista);
  }

  // ── Paginação ──
  function renderizarPaginacao(paginacao) {
    var container = document.getElementById("paginacao");
    if (paginacao.totalPages <= 1) return;

    var html = "";
    for (var pg = 1; pg <= paginacao.totalPages; pg++) {
      html +=
        '<button class="' + (pg === paginacao.page ? "btn-destaque" : "btn-fantasma") + '" ' +
          'style="min-width:36px;height:36px;padding:0;font-family:var(--fonte-titulo)" ' +
          'onclick="irParaPagina(' + pg + ')">' + pg + '</button>';
    }
    container.innerHTML = html;
  }

  function irParaPagina(pagina) {
    estado.pagina = pagina;
    carregarProdutos();
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  function adicionarAoCarrinho(produto) {
    carrinho.adicionar(produto, 1);
  }

  // ── Event listeners ──
  document.getElementById("abas-filtro").addEventListener("click", function(e) {
    var botao = e.target.closest(".aba-filtro");
    if (!botao) return;
    document.querySelectorAll(".aba-filtro").forEach(function(b) { b.classList.remove("ativa"); });
    botao.classList.add("ativa");
    estado.categoria = botao.dataset.categoria;
    estado.pagina = 1;
    carregarProdutos();
  });

  document.getElementById("selecionar-ordenacao").addEventListener("change", function(e) {
    ordenarERenderizar(e.target.value);
  });

  // Inicia
  carregarProdutos();
</script>
</body>
</html>
