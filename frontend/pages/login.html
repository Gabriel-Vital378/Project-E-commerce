<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Periféricos.shop</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="../css/estilo.css">
  <style>
    .alerta-erro {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 6px;
      padding: 0.65rem 0.9rem;
      color: #f87171;
      font-size: 0.875rem;
      margin-bottom: 1rem;
      display: none;
    }
  </style>
</head>
<body>

<div class="container-auth">
  <div class="cartao-auth">

    <div class="logo-auth">⌨ PERIFÉRICOS<span style="color:var(--cor-texto-suave);font-weight:300">.shop</span></div>
    <p class="subtitulo-auth">Faça login na sua conta</p>

    <div class="alerta-erro" id="alerta"></div>

    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" id="campo-email" class="form-control" placeholder="seu@email.com">
    </div>

    <div class="mb-3">
      <label class="form-label">Senha</label>
      <div style="position:relative">
        <input type="password" id="campo-senha" class="form-control" placeholder="••••••••">
        <button type="button" onclick="alternarSenha()" style="position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--cor-texto-suave);cursor:pointer;font-size:0.9rem">👁</button>
      </div>
    </div>

    <button onclick="fazerLogin()" id="botao-entrar" class="btn-destaque w-100 py-2 mt-1">
      <span id="texto-botao">Entrar</span>
      <span id="texto-carregando" style="display:none">Aguarde...</span>
    </button>

    <div class="divisor-auth" style="display:flex;align-items:center;gap:1rem;margin:1.25rem 0;color:var(--cor-texto-suave);font-size:0.8rem">
      <div style="flex:1;height:1px;background:var(--cor-borda)"></div>
      ou
      <div style="flex:1;height:1px;background:var(--cor-borda)"></div>
    </div>

    <p class="text-center" style="font-size:0.875rem;color:var(--cor-texto-suave)">
      Não tem conta?
      <a href="cadastro.html" style="color:var(--cor-destaque);font-weight:500">Cadastre-se grátis</a>
    </p>

    <div style="margin-top:1.5rem;padding:0.85rem;background:var(--cor-fundo-secundario);border-radius:var(--raio-p);border:1px dashed var(--cor-borda);font-size:0.75rem;color:var(--cor-texto-suave)">
      <strong style="color:var(--cor-texto-secundario);display:block;margin-bottom:4px">🧪 Contas de teste</strong>
      Admin: admin@perifericos.com / admin123<br>
      Cliente: cliente@email.com / cliente123
    </div>

  </div>
</div>

<script>
  // ── URL do backend ──
  var URL_API = "http://localhost:3001/api";

  // ── Se já estiver logado, redireciona ──
  var tokenSalvo = localStorage.getItem("token");
  var usuarioSalvo = localStorage.getItem("usuario");
  if (tokenSalvo && usuarioSalvo) {
    try {
      var u = JSON.parse(usuarioSalvo);
      window.location.href = u.role === "admin" ? "admin.html" : "index.html";
    } catch(e) {}
  }

  function alternarSenha() {
    var campo = document.getElementById("campo-senha");
    campo.type = campo.type === "password" ? "text" : "password";
  }

  function mostrarAlerta(mensagem) {
    var el = document.getElementById("alerta");
    el.textContent = mensagem;
    el.style.display = "block";
  }

  function definirCarregando(ativo) {
    document.getElementById("texto-botao").style.display     = ativo ? "none"   : "inline";
    document.getElementById("texto-carregando").style.display = ativo ? "inline" : "none";
    document.getElementById("botao-entrar").disabled = ativo;
  }

  async function fazerLogin() {
    // Esconde alerta anterior
    document.getElementById("alerta").style.display = "none";

    var email = document.getElementById("campo-email").value.trim();
    var senha  = document.getElementById("campo-senha").value;

    // Validação básica
    if (!email || !senha) {
      mostrarAlerta("Preencha o email e a senha.");
      return;
    }

    definirCarregando(true);

    try {
      var resposta = await fetch(URL_API + "/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email: email, password: senha })
      });

      var dados = await resposta.json();

      if (dados.success) {
        // Salva token e usuário no localStorage
        localStorage.setItem("token",   dados.data.token);
        localStorage.setItem("usuario", JSON.stringify(dados.data.user));

        // Redireciona conforme o perfil
        window.location.href = dados.data.user.role === "admin" ? "admin.html" : "index.html";

      } else {
        mostrarAlerta(dados.message || "Email ou senha incorretos.");
      }

    } catch (erro) {
      mostrarAlerta("Não foi possível conectar ao servidor. Verifique se o backend está rodando (npm run dev).");
      console.error("Erro de conexão:", erro);
    }

    definirCarregando(false);
  }

  // Permite pressionar Enter para logar
  document.addEventListener("keydown", function(e) {
    if (e.key === "Enter") fazerLogin();
  });
</script>

</body>
</html>
