<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro — Periféricos.shop</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="../css/estilo.css">
</head>
<body>

<div class="container-auth">
  <div class="cartao-auth">

    <div class="logo-auth">⌨ PERIFÉRICOS<span style="color:var(--cor-texto-suave);font-weight:300">.shop</span></div>
    <p class="subtitulo-auth">Crie sua conta gratuitamente</p>

    <div id="alerta" style="display:none;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:6px;padding:0.65rem 0.9rem;color:#f87171;font-size:0.875rem;margin-bottom:1rem"></div>

    <div class="mb-3">
      <label class="form-label">Nome completo</label>
      <input type="text" id="campo-nome" class="form-control" placeholder="Seu nome">
    </div>

    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" id="campo-email" class="form-control" placeholder="seu@email.com">
    </div>

    <div class="mb-3">
      <label class="form-label">Senha</label>
      <input type="password" id="campo-senha" class="form-control" placeholder="Mínimo 6 caracteres">
      <div style="margin-top:6px;height:3px;background:#1e2d45;border-radius:2px;overflow:hidden">
        <div id="barra-forca" style="height:100%;width:0;transition:all 0.3s;border-radius:2px"></div>
      </div>
      <small id="texto-forca" style="font-size:0.72rem"></small>
    </div>

    <div class="mb-3">
      <label class="form-label">Confirmar senha</label>
      <input type="password" id="campo-confirmar" class="form-control" placeholder="Repita a senha">
    </div>

    <button onclick="fazerCadastro()" id="botao-cadastrar" class="btn-destaque w-100 py-2 mt-1">
      <span id="texto-botao">Criar conta</span>
      <span id="texto-carregando" style="display:none">Criando conta...</span>
    </button>

    <div style="display:flex;align-items:center;gap:1rem;margin:1.25rem 0;color:#4a5870;font-size:0.8rem">
      <div style="flex:1;height:1px;background:#1e2d45"></div>
      ou
      <div style="flex:1;height:1px;background:#1e2d45"></div>
    </div>

    <p class="text-center" style="font-size:0.875rem;color:#4a5870">
      Já tem uma conta?
      <a href="login.html" style="color:#00d4ff;font-weight:500">Fazer login</a>
    </p>

  </div>
</div>

<script>
  var URL_API = "http://localhost:3001/api";

  // Se já logado, redireciona
  if (localStorage.getItem("token")) window.location.href = "index.html";

  // Medidor de força da senha
  document.getElementById("campo-senha").addEventListener("input", function() {
    var val    = this.value;
    var forca  = 0;
    if (val.length >= 6)           forca++;
    if (val.length >= 10)          forca++;
    if (/[A-Z]/.test(val))         forca++;
    if (/[0-9]/.test(val))         forca++;
    if (/[^A-Za-z0-9]/.test(val))  forca++;

    var niveis = [
      { largura: "0%",    cor: "transparent",  texto: "" },
      { largura: "25%",   cor: "#ef4444",      texto: "Fraca" },
      { largura: "50%",   cor: "#f59e0b",      texto: "Regular" },
      { largura: "75%",   cor: "#3b82f6",      texto: "Boa" },
      { largura: "100%",  cor: "#10b981",      texto: "Forte" },
    ];
    var n = Math.min(forca, 4);
    document.getElementById("barra-forca").style.width      = niveis[n].largura;
    document.getElementById("barra-forca").style.background = niveis[n].cor;
    document.getElementById("texto-forca").textContent      = niveis[n].texto;
    document.getElementById("texto-forca").style.color      = niveis[n].cor;
  });

  function mostrarAlerta(msg) {
    var el = document.getElementById("alerta");
    el.textContent   = msg;
    el.style.display = "block";
  }

  function definirCarregando(ativo) {
    document.getElementById("texto-botao").style.display      = ativo ? "none"   : "inline";
    document.getElementById("texto-carregando").style.display = ativo ? "inline" : "none";
    document.getElementById("botao-cadastrar").disabled = ativo;
  }

  async function fazerCadastro() {
    document.getElementById("alerta").style.display = "none";

    var nome      = document.getElementById("campo-nome").value.trim();
    var email     = document.getElementById("campo-email").value.trim();
    var senha     = document.getElementById("campo-senha").value;
    var confirmar = document.getElementById("campo-confirmar").value;

    if (!nome)              { mostrarAlerta("Digite seu nome.");                    return; }
    if (!email)             { mostrarAlerta("Digite seu email.");                   return; }
    if (!senha)             { mostrarAlerta("Digite uma senha.");                   return; }
    if (senha.length < 6)   { mostrarAlerta("A senha precisa ter 6+ caracteres."); return; }
    if (senha !== confirmar){ mostrarAlerta("As senhas não coincidem.");            return; }

    definirCarregando(true);

    try {
      var resposta = await fetch(URL_API + "/auth/register", {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({ name: nome, email: email, password: senha })
      });

      var dados = await resposta.json();

      if (dados.success) {
        localStorage.setItem("token",   dados.data.token);
        localStorage.setItem("usuario", JSON.stringify(dados.data.user));
        window.location.href = "index.html";
      } else {
        mostrarAlerta(dados.message || "Erro ao criar conta.");
      }

    } catch (erro) {
      mostrarAlerta("Não foi possível conectar ao servidor. Verifique se o backend está rodando.");
      console.error(erro);
    }

    definirCarregando(false);
  }

  document.addEventListener("keydown", function(e) {
    if (e.key === "Enter") fazerCadastro();
  });
</script>

</body>
</html>
