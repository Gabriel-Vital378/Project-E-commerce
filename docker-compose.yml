version: "3.9"

services:

  # ─── Banco de Dados MySQL ─────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: ecommerce_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_senha
      MYSQL_DATABASE: ecommerce_perifericos
      MYSQL_USER: ecommerce_user
      MYSQL_PASSWORD: ecommerce_senha
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - ecommerce_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_senha"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Zookeeper (necessário para o Kafka) ─────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: ecommerce_zookeeper
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - ecommerce_net

  # ─── Kafka ────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ecommerce_kafka
    restart: always
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - ecommerce_net

# ─── Volumes ──────────────────────────────────────────────────────────
volumes:
  db_data:

# ─── Rede interna ─────────────────────────────────────────────────────
networks:
  ecommerce_net:
    driver: bridge
